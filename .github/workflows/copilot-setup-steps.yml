name: Copilot Setup Steps

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/copilot-setup-steps.yml"
      - "gradle/**"
      - "gradlew"
      - "gradlew.bat"
      - "settings.gradle.kts"
      - "build.gradle.kts"
      - "app/build.gradle.kts"
      - "gradle.properties"
      - "app/src/main/**"

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    timeout-minutes: 59

    env:
      JAVA_VERSION: "21"
      GO_VERSION: "1.25"
      ANDROID_API_LEVEL: "34"
      ANDROID_BUILD_TOOLS: "34.0.0"
      GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dkotlin.daemon.jvm.options=-Xmx2g"

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: Set up Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r29

      - name: Accept Android SDK licenses
        run: yes | "${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager" --licenses || true

      - name: Install Android SDK packages
        run: |
          "${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager" --install \
            "platform-tools" \
            "platforms;android-${ANDROID_API_LEVEL}" \
            "build-tools;${ANDROID_BUILD_TOOLS}"

      - name: Expose Go path and NDK root alias
        run: |
          echo "ANDROID_NDK_ROOT=${ANDROID_NDK_HOME}" >> "$GITHUB_ENV"
          echo "GO_EXECUTABLE=$(command -v go)" >> "$GITHUB_ENV"

      - name: Generate local.properties
        run: |
          {
            echo "sdk.dir=${ANDROID_SDK_ROOT}"
            echo "ndk.dir=${ANDROID_NDK_HOME}"
          } > local.properties

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Validate toolchain
        run: |
          java -version
          go version
          "${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin/clang" --version || true
          ./gradlew --version

      - name: Vendor Go dependencies
        run: ./gradlew :app:vendorGoDependencies --stacktrace      
        
