name: Copilot Setup Steps

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/copilot-setup-steps.yml"
      - "gradle/**"
      - "gradlew"
      - "gradlew.bat"
      - "settings.gradle.kts"
      - "build.gradle.kts"
      - "app/build.gradle.kts"
      - "gradle.properties"
      - "app/src/main/**"

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    timeout-minutes: 59

    env:
      GO_VERSION: "1.25"
      NDK_VERSION: "27.3.13750724"
      ANDROID_API_LEVEL: "36"
      ANDROID_BUILD_TOOLS: "36.0.0"
      GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dkotlin.daemon.jvm.options=-Xmx2g"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - run: git fetch origin && git diff origin/$(git symbolic-ref --short refs/remotes/origin/HEAD | sed 's@^origin/@@')

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: Accept Android SDK licenses
        run: yes | "${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager" --licenses || true

      - name: Install Android SDK packages
        run: |
          "${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager" --install \
            "platform-tools" \
            "platforms;android-${ANDROID_API_LEVEL}" \
            "build-tools;${ANDROID_BUILD_TOOLS}" \
            "ndk;${NDK_VERSION}"

      - name: Expose Go path and NDK root alias
        run: |
          echo "ANDROID_NDK_HOME=${ANDROID_SDK_ROOT}/ndk/${NDK_VERSION}" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_ROOT=${ANDROID_SDK_ROOT}/ndk/${NDK_VERSION}" >> "$GITHUB_ENV"
          echo "GO_EXECUTABLE=$(command -v go)" >> "$GITHUB_ENV"

      - name: Generate local.properties
        run: |
          {
            echo "sdk.dir=${ANDROID_SDK_ROOT}"
            echo "ndk.dir=${ANDROID_NDK_HOME}"
          } > local.properties

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Validate toolchain
        run: |
          java -version
          go version
          "${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin/clang" --version || true
          ./gradlew --version

      - name: Vendor Go dependencies
        run: ./gradlew :app:vendorGoDependencies --stacktrace

      - name: Verify app build, tests, and lint
        run: ./gradlew --no-daemon :app:compileDebugKotlin :app:testDebugUnitTest :app:lintDebug --stacktrace
